<script>
document.addEventListener('DOMContentLoaded', function() {
  // Получаем все ссылки на банки
  const bankLinks = document.querySelectorAll('.bank-link');
  
  bankLinks.forEach(link => {
    link.addEventListener('click', function(event) {
      const popupEnabled = this.getAttribute('data-popup-enabled') === '1';
      const popupMessage = this.getAttribute('data-popup-message');
      
      // Если всплывающее окно включено и есть сообщение
      if (popupEnabled && popupMessage) {
        event.preventDefault(); // Блокируем переход
        
        // Показываем всплывающее окно
        alert(popupMessage);
        
        // Переход заблокирован - пользователь остается на странице
        return false;
      }
      
      // Если popup не настроен, блокируем все кнопки и делаем переход
      event.preventDefault();
      
      // Блокируем все кнопки банков
      bankLinks.forEach(otherLink => {
        otherLink.classList.add('disabled');
        const button = otherLink.querySelector('button');
        if (button) {
          button.style.opacity = '0.5';
          button.style.cursor = 'not-allowed';
          button.disabled = true;
        }
      });
      
      // Добавляем индикатор загрузки на выбранную кнопку
      const button = this.querySelector('button');
      if (button) {
        button.style.opacity = '0.7';
        const textDiv = button.querySelector('div > div:nth-child(2)');
        if (textDiv) {
          textDiv.innerHTML = '<b>Переход...</b>';
        }
      }
      
      // Переходим по ссылке
      const href = this.getAttribute('href');
      setTimeout(function() {
        window.location.href = href;
      }, 100);
    });
  });
  
  // Специальная обработка для Сбербанка - убрана задержка для мгновенного перехода
  const sberLink = document.getElementById('sber');
  if (sberLink) {
    const popupEnabled = sberLink.getAttribute('data-popup-enabled') === '1';
    
    // Если popup включен, обрабатываем его (уже обработано выше)
    // Если popup не включен, просто переходим по ссылке без задержки
  }
  
  // Добавляем стили
  const style = document.createElement('style');
  style.textContent = `
    .bank-link.disabled {
      pointer-events: none;
      opacity: 0.5;
    }
  `;
  document.head.appendChild(style);
});
</script>
